<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="車両整備管理">
<title>車両整備管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#1A0A0A;font-family:'Noto Sans JP',sans-serif;color:#E8EAF0;overscroll-behavior:none}
input,select,textarea{background:#1F1010;border:1px solid #3D1515;border-radius:12px;padding:12px 14px;color:#E8EAF0;font-size:15px;width:100%;outline:none;box-sizing:border-box;appearance:none;font-family:'Noto Sans JP',sans-serif;color-scheme:dark}
input:focus,select:focus,textarea:focus{border-color:#E53E3E}
option{background:#1F1010}
button{cursor:pointer;font-family:'Noto Sans JP',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#5C2020;border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}
#loading{position:fixed;inset:0;background:#1A0A0A;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999}
.spinner{width:44px;height:44px;border:3px solid #1F2937;border-top:3px solid #E53E3E;border-radius:50%;animation:spin 0.8s linear infinite}
#app{max-width:500px;margin:0 auto;padding-bottom:90px;display:none}
.header{background:linear-gradient(180deg,#1C0D0D,#1A0A0A);padding:16px 15px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid #3D1515}
.header-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:14px}
.header-logo{display:flex;align-items:center;gap:12px;flex:1}
.truck-img{width:68px;height:68px;border-radius:50%;overflow:hidden;border:2px solid rgba(229,62,62,0.5);flex-shrink:0}
.truck-img img{width:100%;height:100%;object-fit:cover}
.tabs{display:flex;background:#1C0D0D;border-radius:10px 10px 0 0}
.tab{flex:1;padding:12px 0;border:none;background:transparent;color:#6B7280;font-size:13px;font-weight:400;border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Noto Sans JP',sans-serif}
.tab.active{background:#1F1010;color:#E53E3E;font-weight:700;border-bottom:2px solid #E53E3E}
.content{padding:14px 13px 0}
.search-wrap{position:relative;margin-bottom:11px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%)}
.search-wrap input{padding-left:38px;font-size:14px}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.btn-primary{background:linear-gradient(135deg,#C53030,#E53E3E);border:none;border-radius:12px;padding:14px 10px;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 15px rgba(229,62,62,0.3)}
.btn-success{background:linear-gradient(135deg,#7B341E,#C05621);border:none;border-radius:12px;padding:14px 10px;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 15px rgba(5,150,105,0.3)}
.btn-icon{background:#1F1010;border:1px solid #3D1515;border-radius:10px;padding:10px;color:#6B7280;display:flex}
.vehicle-card{background:linear-gradient(135deg,#111827,#0F172A);border-radius:16px;border:1px solid #3D1515;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.vehicle-card.drag-over{border:2px dashed #E53E3E}
.vehicle-header{padding:12px 15px;display:flex;gap:12px;align-items:center;cursor:pointer;user-select:none}
.vehicle-photo{width:60px;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;border:1px solid #3D1515;background:#1C0D0D}
.vehicle-photo img{width:100%;height:100%;object-fit:cover}
.vehicle-detail{border-top:1px solid #3D1515}
.detail-section{background:#1C0D0D;padding:14px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.detail-box{background:#1F1010;border-radius:10px;padding:10px 12px;border:1px solid #3D1515}
.detail-label{color:#6B7280;font-size:11px;margin:0 0 4px;letter-spacing:0.05em}
.detail-value{color:#E8EAF0;font-size:13px;margin:0;font-weight:600;word-break:break-all}
.record-row{background:#1F1010;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid #3D1515}
.stat-card{background:linear-gradient(135deg,#111827,#0F172A);border-radius:14px;padding:16px;border:1px solid #3D1515}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:1000;animation:fadeIn 0.15s ease}
.modal-body{background:#1F1010;border-radius:24px 24px 0 0;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;padding:24px 18px 52px;box-shadow:0 -10px 40px rgba(0,0,0,0.7);animation:slideUp 0.25s ease;border-top:1px solid #3D1515}
.field{margin-bottom:14px}
.field label{display:block;color:#9CA3AF;font-size:12px;margin-bottom:6px;font-weight:500;letter-spacing:0.05em}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.parts-item{background:#1C0D0D;border:1px solid #3D1515;border-radius:12px;padding:12px;margin-bottom:10px}
.empty-state{text-align:center;padding:50px 20px}
</style>
</head>

<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbz12Fm3q-uTqDIMRyTTCiW8v56hkNshFcIgciMLIeq2Zyqk1GuG46O_IITrLwOWCYDr/exec";
var vehicles=[],records=[],editingVehicle=null,editingRecord=null;
var currentParts=[],currentVehiclePhoto="",presetsVisible=false;
var openVehicleIds={},dragSrcId=null;

var CATS={
  engine:{label:"エンジン系",color:"#F97316",bg:"rgba(249,115,22,0.12)"},
  brake:{label:"ブレーキ系",color:"#EF4444",bg:"rgba(239,68,68,0.12)"},
  tire:{label:"タイヤ・ホイール",color:"#3B82F6",bg:"rgba(59,130,246,0.12)"},
  oil:{label:"オイル・液体",color:"#10B981",bg:"rgba(16,185,129,0.12)"},
  electrical:{label:"電装系",color:"#EAB308",bg:"rgba(234,179,8,0.12)"},
  body:{label:"外装・内装",color:"#8B5CF6",bg:"rgba(139,92,246,0.12)"},
  other:{label:"その他",color:"#6B7280",bg:"rgba(107,114,128,0.12)"}
};
var PRESETS=["キャブサス番号","フロントサス番号","リアサス番号","エンジン番号","ミッション番号","デフ番号",
  "ブレーキマスター番号","キャリパー番号（前）","キャリパー番号（後）","ラジエーター番号",
  "エアコンコンプレッサー番号","オルタネーター番号","スターター番号","ECU番号",
  "ステアリングギア番号","プロペラシャフト番号","ドライブシャフト番号（左）","ドライブシャフト番号（右）",
  "バッテリー品番","タイヤサイズ","ホイールサイズ","その他部品番号"];
var V_HEADERS=["id","licensePlate","driver","vinType","vinNum","engineNum","maker","model","year","color","currentMileage","notes","customParts","photo","updatedAt"];
var R_HEADERS=["id","licensePlate","partName","category","date","worker","mileage","cost","notes","createdAt"];

function parseRows(rows){
  if(!rows||rows.length<2)return[];
  var h=rows[0];
  return rows.slice(1).map(function(row){
    var o={};
    h.forEach(function(k,i){o[k]=row[i]!==undefined?String(row[i]):"";});
    if(o.customParts){try{o.customParts=JSON.parse(o.customParts);}catch(e){o.customParts=[];}}
    return o;
  });
}

function loadSheet(sheet){
  return new Promise(function(resolve){
    var id="gascb"+Date.now()+Math.floor(Math.random()*99999);
    var s=document.createElement("script");
    var done=false;
    var t=setTimeout(function(){
      if(!done){done=true;delete window[id];if(s.parentNode)s.parentNode.removeChild(s);resolve([]);}
    },10000);
    window[id]=function(d){
      if(!done){done=true;clearTimeout(t);delete window[id];if(s.parentNode)s.parentNode.removeChild(s);resolve(d);}
    };
    s.onerror=function(){
      if(!done){done=true;clearTimeout(t);delete window[id];if(s.parentNode)s.parentNode.removeChild(s);resolve([]);}
    };
    s.src=GAS_URL+"?sheet="+sheet+"&callback="+id+"&t="+Date.now();
    document.head.appendChild(s);
  });
}

async function loadData(){
  try{
    var vR=await loadSheet("vehicles");
    var rR=await loadSheet("records");
    if((!vR||vR.length===0)&&(!rR||rR.length===0))return null;
    return{vehicles:parseRows(vR),records:parseRows(rR)};
  }catch(e){return null;}
}

async function saveData(data){
  try{
    var toRows=function(arr,hdrs){
      var rows=[hdrs];
      arr.forEach(function(item){
        rows.push(hdrs.map(function(h){
          if(h==="customParts")return JSON.stringify(item[h]||[]);
          return item[h]!==undefined?String(item[h]):"";
        }));
      });
      return rows;
    };
    await fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({sheet:"vehicles",data:toRows(data.vehicles,V_HEADERS)})});
    await fetch(GAS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({sheet:"records",data:toRows(data.records,R_HEADERS)})});
    return true;
  }catch(e){return false;}
}

async function init(){
  var ys=document.getElementById("v-year");
  for(var y=new Date().getFullYear();y>=new Date().getFullYear()-39;y--){
    var o=document.createElement("option");o.value=y;o.textContent=y+"年";ys.appendChild(o);
  }
  var pb=document.getElementById("presets-btns");
  PRESETS.forEach(function(lbl){
    var btn=document.createElement("button");
    btn.style.cssText="background:#1C0D0D;border:1px solid #3D1515;border-radius:20px;padding:6px 12px;color:#60A5FA;font-size:12px;margin:2px";
    btn.textContent="+ "+lbl;
    btn.onclick=function(){addPart(lbl);presetsVisible=false;document.getElementById("presets-panel").style.display="none";};
    pb.appendChild(btn);
  });
  document.getElementById("r-date").value=new Date().toISOString().split("T")[0];
  await refresh();
}

async function refresh(silent){
  if(!silent)updateStatus("↻ 更新中...","#3B82F6");
  try{
    var data=await loadData();
    if(data){vehicles=data.vehicles||[];records=data.records||[];updateStatus("● オンライン","#10B981");}
    else{updateStatus("● オフライン","#F59E0B");}
  }catch(e){updateStatus("● オフライン","#F59E0B");}
  document.getElementById("loading").style.display="none";
  document.getElementById("app").style.display="block";
  renderList();restoreOpenVehicles();renderStats();updateRecordPlateOptions();
}

function updateStatus(t,c){
  document.getElementById("status-bar").innerHTML=vehicles.length+"台 · "+records.length+"件　<span style=\"color:"+c+";font-size:11px\">"+t+"</span>";
}

function switchTab(tab){
  document.getElementById("pane-list").style.display=tab==="list"?"block":"none";
  document.getElementById("pane-stats").style.display=tab==="stats"?"block":"none";
  document.getElementById("tab-list").className="tab"+(tab==="list"?" active":"");
  document.getElementById("tab-stats").className="tab"+(tab==="stats"?" active":"");
}

function getDefImg(){return document.getElementById("truck-logo").src;}

function renderList(){
  var q=document.getElementById("search-input").value.toLowerCase();
  var filtered=vehicles.filter(function(v){
    return !q||v.licensePlate.toLowerCase().includes(q)||(v.maker||"").toLowerCase().includes(q)||
      (v.model||"").toLowerCase().includes(q)||(v.driver||"").toLowerCase().includes(q);
  });
  var el=document.getElementById("vehicle-list");
  if(filtered.length===0){
    el.innerHTML='<div class="empty-state"><img src="'+getDefImg()+'" style="width:180px;height:180px;border-radius:50%;border:2px solid rgba(229,62,62,0.3);object-fit:cover"><p style="color:#6B7280;font-size:14px;line-height:1.8;margin-top:16px">まだ車両が登録されていません。<br>「車両を登録」から始めましょう！</p></div>';
    return;
  }
  el.innerHTML=filtered.map(function(v){
    var recs=records.filter(function(r){return r.licensePlate===v.licensePlate;});
    var cost=recs.reduce(function(s,r){return s+(parseInt(r.cost)||0);},0);
    var last=recs.slice().sort(function(a,b){return b.date.localeCompare(a.date);})[0];
    var img=v.photo||getDefImg();
    return '<div class="vehicle-card" id="vc-'+v.id+'">'+
      '<div class="vehicle-header" data-vid="'+v.id+'" onclick="toggleVehicle(this.dataset.vid)">'+
        '<div class="vehicle-photo"><img src="'+img+'" onerror="this.src=\"'+getDefImg()+'\"">'+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<p style="color:#E8EAF0;font-weight:800;font-size:20px;margin:0">'+v.licensePlate+'</p>'+
          (v.driver?'<p style="color:#60A5FA;font-size:13px;margin:2px 0 0">👤 '+v.driver+'</p>':'')+
          '<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">'+
            ((v.maker||v.model)?'<span style="color:#9CA3AF;font-size:13px">'+v.maker+' '+v.model+'</span>':'')+
            (v.year?'<span style="background:rgba(59,130,246,0.15);color:#60A5FA;border:1px solid rgba(229,62,62,0.3);padding:1px 7px;border-radius:20px;font-size:11px">'+v.year+'年式</span>':'')+
          '</div>'+
          '<div style="display:flex;gap:8px;margin-top:4px">'+
            '<span style="color:#6B7280;font-size:12px">'+recs.length+'件</span>'+
            (cost>0?'<span style="color:#10B981;font-size:12px">¥'+cost.toLocaleString()+'</span>':'')+
            (last?'<span style="color:#6B7280;font-size:12px">最終: '+last.date+'</span>':'')+
          '</div>'+
        '</div>'+
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" id="chevron-'+v.id+'" style="transition:0.2s;flex-shrink:0"><polyline points="6 9 12 15 18 9"/></svg>'+
      '</div>'+
      '<div id="vd-'+v.id+'" style="display:none">'+renderDetail(v,recs)+'</div>'+
    '</div>';
  }).join("");
  setTimeout(enableDrag,100);
}

function renderDetail(v,recs){
  var sorted=recs.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var cpHtml="";
  if(v.customParts&&v.customParts.length>0){
    cpHtml='<p style="color:#6B7280;font-size:11px;font-weight:700;margin:0 0 8px">🔩 追加部品番号</p>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px">'+
      v.customParts.filter(function(p){return p.label||p.value;}).map(function(p,i){
        return '<div class="detail-box"><p class="detail-label">'+( p.label||"項目"+(i+1))+'</p><p class="detail-value" style="font-family:monospace;font-size:11px">'+( p.value||"—")+'</p></div>';
      }).join("")+"</div>";
  }
  return (v.photo?'<div style="padding:12px 14px 0;background:#1C0D0D"><img src="'+v.photo+'" style="width:100%;height:200px;object-fit:cover;border-radius:12px;border:1px solid #3D1515"></div>':'')+
  '<div style="background:#1C0D0D;padding:14px">'+
    '<div class="detail-grid">'+
      '<div class="detail-box"><p class="detail-label">車体番号 型式</p><p class="detail-value" style="font-family:monospace;font-size:11px">'+( v.vinType||"—")+'</p></div>'+
      '<div class="detail-box"><p class="detail-label">車体番号 番号</p><p class="detail-value" style="font-family:monospace;font-size:11px">'+( v.vinNum||"—")+'</p></div>'+
      '<div class="detail-box"><p class="detail-label">エンジン番号</p><p class="detail-value" style="font-family:monospace;font-size:11px">'+( v.engineNum||"—")+'</p></div>'+
      '<div class="detail-box"><p class="detail-label">走行距離</p><p class="detail-value">'+( v.currentMileage?parseInt(v.currentMileage).toLocaleString()+" km":"—")+'</p></div>'+
      '<div class="detail-box"><p class="detail-label">年式</p><p class="detail-value">'+( v.year?v.year+"年式":"—")+'</p></div>'+
      '<div class="detail-box"><p class="detail-label">カラー</p><p class="detail-value">'+( v.color||"—")+'</p></div>'+
    '</div>'+
    (v.notes?'<div class="detail-box" style="margin-bottom:10px"><p class="detail-label">メモ</p><p style="color:#9CA3AF;font-size:12px;margin:0;line-height:1.6">'+v.notes+'</p></div>':'')+
    cpHtml+
    '<div style="display:flex;gap:8px">'+
      '<button data-vid="'+v.id+'" onclick="editVehicle(this.dataset.vid)" style="flex:1;background:#1F2937;border:none;border-radius:10px;padding:10px;color:#60A5FA;font-size:13px;display:flex;align-items:center;justify-content:center;gap:5px">✏️ 編集</button>'+
      '<button data-vid="'+v.id+'" onclick="deleteVehicle(this.dataset.vid)" style="flex:1;background:transparent;border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px;color:#F87171;font-size:13px;display:flex;align-items:center;justify-content:center;gap:5px">🗑 削除</button>'+
    '</div>'+
  '</div>'+
  '<div style="padding:10px 14px 14px;background:#1A0A0A">'+
    '<p style="color:#6B7280;font-size:11px;font-weight:700;letter-spacing:0.1em;margin:0 0 10px">🔧 整備履歴 ('+recs.length+'件)</p>'+
    (sorted.length===0?'<p style="color:#374151;font-size:13px;text-align:center;padding:16px 0">整備記録がありません</p>':sorted.map(renderRecordRow).join(""))+
  '</div>';
}

function renderRecordRow(r){
  var cat=CATS[r.category]||CATS.other;
  return '<div class="record-row"><div style="display:flex;gap:10px;align-items:flex-start">'+
    '<div style="background:'+cat.bg+';border-radius:8px;padding:7px;border:1px solid '+cat.color+'30;flex-shrink:0">'+
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+cat.color+'" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>'+
    '</div>'+
    '<div style="flex:1">'+
      '<p style="color:#E8EAF0;font-weight:700;font-size:16px;margin:0">'+r.partName+'</p>'+
      '<div style="display:flex;gap:6px;margin-top:5px;flex-wrap:wrap">'+
        '<span style="background:rgba(59,130,246,0.15);color:#60A5FA;border:1px solid rgba(229,62,62,0.3);padding:2px 8px;border-radius:20px;font-size:11px">📅 '+r.date+'</span>'+
        (r.worker?'<span style="background:rgba(139,92,246,0.15);color:#A78BFA;border:1px solid rgba(139,92,246,0.3);padding:2px 8px;border-radius:20px;font-size:11px">👤 '+r.worker+'</span>':'')+
        (r.mileage?'<span style="background:rgba(107,114,128,0.15);color:#9CA3AF;border:1px solid rgba(107,114,128,0.3);padding:2px 8px;border-radius:20px;font-size:11px">🛣 '+parseInt(r.mileage).toLocaleString()+'km</span>':'')+
        (r.cost?'<span style="background:rgba(16,185,129,0.15);color:#34D399;border:1px solid rgba(16,185,129,0.3);padding:2px 8px;border-radius:20px;font-size:11px">¥'+parseInt(r.cost).toLocaleString()+'</span>':'')+
      '</div>'+
      (r.notes?'<p style="color:#6B7280;font-size:12px;margin:6px 0 0;line-height:1.6">'+r.notes+'</p>':'')+

    '<button data-rid="'+r.id+'" onclick="event.stopPropagation();editRecord(this.dataset.rid)" style="background:#1F2937;border:none;border-radius:8px;padding:7px 10px;color:#60A5FA;font-size:13px;flex-shrink:0">✏️</button>'+
  '</div></div>';

function enableDrag(){
  document.querySelectorAll(".vehicle-card").forEach(function(card){
    card.setAttribute("draggable","true");
    card.ondragstart=function(e){dragSrcId=card.id.replace("vc-","");setTimeout(function(){card.style.opacity="0.5";},0);};
    card.ondragend=function(){card.style.opacity="1";document.querySelectorAll(".vehicle-card").forEach(function(c){c.classList.remove("drag-over");});};
    card.ondragover=function(e){e.preventDefault();card.classList.add("drag-over");};
    card.ondragleave=function(){card.classList.remove("drag-over");};
    card.ondrop=function(e){
      e.preventDefault();card.classList.remove("drag-over");
      var tid=card.id.replace("vc-","");if(dragSrcId===tid)return;
      var si=vehicles.findIndex(function(v){return v.id===dragSrcId;});
      var ti=vehicles.findIndex(function(v){return v.id===tid;});
      if(si<0||ti<0)return;
      var m=vehicles.splice(si,1)[0];vehicles.splice(ti,0,m);
      renderList();restoreOpenVehicles();
      saveData({vehicles:vehicles,records:records});
    };
  });
}

function toggleVehicle(id){
  var det=document.getElementById("vd-"+id),chev=document.getElementById("chevron-"+id);
  if(!det)return;
  if(openVehicleIds[id]){det.style.display="none";if(chev)chev.style.transform="none";delete openVehicleIds[id];}
  else{det.style.display="block";if(chev)chev.style.transform="rotate(180deg)";openVehicleIds[id]=true;}
}

function restoreOpenVehicles(){
  setTimeout(function(){
    Object.keys(openVehicleIds).forEach(function(id){
      var det=document.getElementById("vd-"+id),chev=document.getElementById("chevron-"+id);
      if(det){det.style.display="block";if(chev)chev.style.transform="rotate(180deg)";}
    });
    enableDrag();
  },50);
}

function renderStats(){
  var total=records.reduce(function(s,r){return s+(parseInt(r.cost)||0);},0);
  var html='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
  [{label:"管理車両数",v:vehicles.length+"台",c:"#3B82F6"},{label:"総記録数",v:records.length+"件",c:"#10B981"},
   {label:"総費用",v:"¥"+total.toLocaleString(),c:"#F59E0B"},{label:"平均費用/件",v:records.length?"¥"+Math.round(total/records.length).toLocaleString():"—",c:"#F87171"}
  ].forEach(function(s){html+='<div class="stat-card"><p style="color:'+s.c+';font-size:24px;font-weight:800;margin:0 0 4px">'+s.v+'</p><p style="color:#6B7280;font-size:12px;margin:0">'+s.label+'</p></div>';});
  html+='</div><button onclick="exportCSV()" style="width:100%;background:linear-gradient(135deg,#7B341E,#C05621);border:none;border-radius:14px;padding:14px;color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px">📥 CSVダウンロード</button>';
  document.getElementById("stats-content").innerHTML=html;
}

function openModal(t){
  if(t==="record"){updateRecordPlateOptions();["r-part","r-worker","r-mileage","r-cost","r-notes"].forEach(function(id){document.getElementById(id).value="";});document.getElementById("r-date").value=new Date().toISOString().split("T")[0];document.getElementById("r-category").value="oil";}
  if(t==="vehicle"&&!editingVehicle)clearVehicleForm();
  document.getElementById("modal-"+t).style.display="block";
}
function closeModal(t){
  document.getElementById("modal-"+t).style.display="none";
  if(t==="vehicle"){editingVehicle=null;clearVehicleForm();}
  if(t==="record"){editingRecord=null;document.getElementById("record-modal-title").textContent="🔧 整備記録を追加";}
}
function clearVehicleForm(){
  ["v-plate","v-driver","v-vin-type","v-vin-num","v-engine-num","v-model","v-color","v-mileage","v-notes"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("v-maker").value="";document.getElementById("v-year").value="";
  document.getElementById("v-photo-preview").style.display="none";document.getElementById("v-photo-preview").src="";
  document.getElementById("v-photo-label").textContent="📷 タップして写真を選択";
  currentVehiclePhoto="";currentParts=[];renderParts();
  document.getElementById("vehicle-modal-title").textContent="🚛 車両を登録";
}
function updateRecordPlateOptions(){
  var sel=document.getElementById("r-plate");sel.innerHTML='<option value="">選択してください</option>';
  vehicles.forEach(function(v){var o=document.createElement("option");o.value=v.licensePlate;o.textContent=v.licensePlate+(v.driver?" ["+v.driver+"]":"")+(v.maker?" ("+v.maker+" "+(v.model||"")+")":"");sel.appendChild(o);});
}
function handlePhotoUpload(input){
  var file=input.files[0];if(!file)return;
  document.getElementById("v-photo-label").textContent="⏳ 処理中...";
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement("canvas"),maxSize=320,w=img.width,h=img.height;
      if(w>h){if(w>maxSize){h=Math.round(h*maxSize/w);w=maxSize;}}else{if(h>maxSize){w=Math.round(w*maxSize/h);h=maxSize;}}
      canvas.width=w;canvas.height=h;canvas.getContext("2d").drawImage(img,0,0,w,h);
      var c=canvas.toDataURL("image/jpeg",0.5);
      currentVehiclePhoto=c;document.getElementById("v-photo-preview").src=c;
      document.getElementById("v-photo-preview").style.display="block";
      document.getElementById("v-photo-label").textContent="✓ 写真設定完了！（タップで変更）";
    };img.src=e.target.result;
  };reader.readAsDataURL(file);
}
function addPart(label){currentParts.push({id:Date.now().toString(),label:label||"",value:""});renderParts();}
function renderParts(){
  document.getElementById("parts-count").textContent=currentParts.length+"件";
  document.getElementById("parts-list").innerHTML=currentParts.map(function(p,i){
    return '<div class="parts-item"><div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><div style="background:#1F2937;border-radius:6px;padding:3px 8px;color:#6B7280;font-size:10px;font-weight:700">#'+(i+1)+'</div>'+
      '<input style="background:#1C0D0D;border:1px solid #3D1515;border-radius:8px;padding:8px 10px;color:#E8EAF0;font-size:13px;flex:1;outline:none;width:auto" value="'+p.label.replace(/"/g,'&quot;')+'" oninput="currentParts['+i+'].label=this.value" placeholder="項目名">'+
      '<button onclick="currentParts.splice('+i+',1);renderParts()" style="background:transparent;border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:7px 9px;color:#F87171;display:flex;flex-shrink:0">🗑</button></div>'+
      '<input style="background:#1C0D0D;border:1px solid #3D1515;border-radius:9px;padding:9px 11px;color:#E8EAF0;font-size:14px;width:100%;outline:none;font-family:monospace" value="'+p.value.replace(/"/g,'&quot;')+'" oninput="currentParts['+i+'].value=this.value" placeholder="番号・値を入力"></div>';
  }).join("");
}
function togglePresets(){presetsVisible=!presetsVisible;document.getElementById("presets-panel").style.display=presetsVisible?"block":"none";}

async function saveVehicle(){
  var plate=document.getElementById("v-plate").value.trim().toUpperCase();
  if(!plate){alert("ナンバープレートは必須です");return;}
  var v={id:editingVehicle?editingVehicle.id:Date.now().toString(),
    licensePlate:plate,driver:document.getElementById("v-driver").value.trim(),
    vinType:document.getElementById("v-vin-type").value.trim(),vinNum:document.getElementById("v-vin-num").value.trim(),
    engineNum:document.getElementById("v-engine-num").value.trim(),maker:document.getElementById("v-maker").value,
    model:document.getElementById("v-model").value.trim(),year:document.getElementById("v-year").value,
    color:document.getElementById("v-color").value.trim(),currentMileage:document.getElementById("v-mileage").value,
    notes:document.getElementById("v-notes").value.trim(),customParts:currentParts.slice(),
    photo:currentVehiclePhoto,updatedAt:new Date().toISOString()};
  if(editingVehicle){vehicles=vehicles.map(function(x){return x.id===v.id?v:x;});}else{vehicles.unshift(v);}
  closeModal("vehicle");renderList();restoreOpenVehicles();
  updateStatus("● 保存中...","#F59E0B");
  var ok=await saveData({vehicles:vehicles,records:records});
  updateStatus(ok?"● オンライン":"● オフライン",ok?"#10B981":"#F59E0B");
  if(!ok)alert("保存に失敗しました。ネット接続を確認してください。");
}

async function saveRecord(){
  var plate=document.getElementById("r-plate").value,part=document.getElementById("r-part").value.trim(),date=document.getElementById("r-date").value;
  if(!plate||!part||!date){alert("ナンバー・部品名・日付は必須です");return;}
  var r={id:editingRecord?editingRecord.id:Date.now().toString(),
    licensePlate:plate,partName:part,category:document.getElementById("r-category").value,
    date:date,worker:document.getElementById("r-worker").value.trim(),
    mileage:document.getElementById("r-mileage").value,cost:document.getElementById("r-cost").value,
    notes:document.getElementById("r-notes").value.trim(),
    createdAt:editingRecord?editingRecord.createdAt:new Date().toISOString()};
  if(editingRecord){records=records.map(function(x){return x.id===r.id?r:x;});editingRecord=null;document.getElementById("record-modal-title").textContent="🔧 整備記録を追加";closeModal("record");}
  else{records.unshift(r);["r-part","r-worker","r-mileage","r-cost","r-notes"].forEach(function(id){document.getElementById(id).value="";});var btn=document.querySelector("#modal-record button[onclick='saveRecord()']");if(btn){btn.textContent="✓ 保存しました！";setTimeout(function(){btn.textContent="✓ 整備記録を保存";},2000);}}
  renderList();restoreOpenVehicles();
  updateStatus("● 保存中...","#F59E0B");
  var ok=await saveData({vehicles:vehicles,records:records});
  updateStatus(ok?"● オンライン":"● オフライン",ok?"#10B981":"#F59E0B");
  if(!ok)alert("保存に失敗しました。ネット接続を確認してください。");
}

function editVehicle(id){
  var v=vehicles.find(function(x){return x.id===id;});if(!v)return;
  editingVehicle=v;
  document.getElementById("v-plate").value=v.licensePlate||"";document.getElementById("v-driver").value=v.driver||"";
  document.getElementById("v-vin-type").value=v.vinType||"";document.getElementById("v-vin-num").value=v.vinNum||"";
  document.getElementById("v-engine-num").value=v.engineNum||"";document.getElementById("v-maker").value=v.maker||"";
  document.getElementById("v-model").value=v.model||"";document.getElementById("v-year").value=v.year||"";
  document.getElementById("v-color").value=v.color||"";document.getElementById("v-mileage").value=v.currentMileage||"";
  document.getElementById("v-notes").value=v.notes||"";
  currentParts=(v.customParts||[]).map(function(p){return Object.assign({},p);});
  currentVehiclePhoto=v.photo||"";
  if(v.photo){document.getElementById("v-photo-preview").src=v.photo;document.getElementById("v-photo-preview").style.display="block";document.getElementById("v-photo-label").textContent="✓ 写真設定済み";}
  renderParts();document.getElementById("vehicle-modal-title").textContent="✏️ 車両情報を編集";openModal("vehicle");
}

function editRecord(id){
  var r=records.find(function(x){return x.id===id;});if(!r)return;
  editingRecord=r;
  document.getElementById("r-plate").value=r.licensePlate;document.getElementById("r-part").value=r.partName;
  document.getElementById("r-category").value=r.category||"oil";document.getElementById("r-date").value=r.date;
  document.getElementById("r-worker").value=r.worker||"";document.getElementById("r-mileage").value=r.mileage||"";
  document.getElementById("r-cost").value=r.cost||"";document.getElementById("r-notes").value=r.notes||"";
  document.getElementById("record-modal-title").textContent="✏️ 整備記録を編集";
  document.getElementById("modal-record").style.display="block";
}

async function deleteVehicle(id){
  if(!confirm("この車両と整備記録をすべて削除しますか？"))return;
  var veh=vehicles.find(function(x){return x.id===id;});
  vehicles=vehicles.filter(function(x){return x.id!==id;});
  records=records.filter(function(r){return r.licensePlate!==(veh&&veh.licensePlate);});
  renderList();updateStatus("● 保存中...","#F59E0B");
  var ok=await saveData({vehicles:vehicles,records:records});
  updateStatus(ok?"● オンライン":"● オフライン",ok?"#10B981":"#F59E0B");
}

function exportCSV(){
  var vmap={};vehicles.forEach(function(v){vmap[v.licensePlate]=v;});
  var allL=[];vehicles.forEach(function(v){(v.customParts||[]).forEach(function(p){if(p.label&&allL.indexOf(p.label)<0)allL.push(p.label);});});
  var header=["ナンバー","ドライバー","車体番号型式","車体番号番号","エンジン番号","メーカー","車種","年式","カラー"].concat(allL).concat(["部品・作業名","カテゴリ","作業日","担当者","走行距離(km)","費用(円)","備考"]);
  var rows=records.map(function(r){var v=vmap[r.licensePlate]||{};var pm={};(v.customParts||[]).forEach(function(p){pm[p.label]=p.value;});
    return [r.licensePlate,v.driver||"",v.vinType||"",v.vinNum||"",v.engineNum||"",v.maker||"",v.model||"",v.year||"",v.color||""].concat(allL.map(function(l){return pm[l]||"";})).concat([r.partName,(CATS[r.category]||CATS.other).label,r.date,r.worker||"",r.mileage||"",r.cost||"",r.notes||""]);});
  var csv=[header].concat(rows).map(function(row){return row.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="車両整備記録_"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(url);
}

window.onload=init;
setInterval(function(){refresh(true);},30000);
</script>
