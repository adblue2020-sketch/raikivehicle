<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>車両整備管理 - ライキ</title>
<style>
  :root {
    --bg: #1a0a0a;
    --surface: #2a1010;
    --surface2: #3a1818;
    --accent: #cc2200;
    --accent2: #ff4422;
    --text: #f0e0d0;
    --text2: #b09080;
    --border: #4a2020;
    --online: #44cc66;
    --warning: #ffaa00;
    --danger: #ff3333;
    --blue: #3399ff;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px; /* ベースフォントサイズを拡大 */
  }

  /* ===== HEADER ===== */
  .app-header {
    background: linear-gradient(135deg, #1a0000 0%, #2d0808 100%);
    border-bottom: 2px solid var(--accent);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-logo { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
  .app-title-area { flex: 1; }
  .app-title { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; }
  .app-subtitle { font-size: 0.9rem; color: var(--text2); display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--online); display: inline-block; }
  .reload-btn {
    width: 38px; height: 38px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== TABS ===== */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab-btn {
    flex: 1; padding: 12px 8px; font-size: 0.95rem; font-weight: 600;
    background: none; border: none; color: var(--text2); cursor: pointer;
    border-bottom: 3px solid transparent; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  /* ===== MAIN CONTENT ===== */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ===== VEHICLE LIST ===== */
  .vehicle-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .vehicle-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .vehicle-card:active { border-color: var(--accent2); }
  .vehicle-card-img {
    width: 100%; height: 140px; object-fit: cover;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
  }
  .vehicle-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .vehicle-card-body { padding: 12px; }
  .vehicle-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
  .vehicle-meta { display: flex; flex-wrap: wrap; gap: 6px; }
  .vehicle-tag {
    font-size: 0.8rem; padding: 3px 8px;
    background: var(--surface2); border-radius: 4px; color: var(--text2);
  }
  .vehicle-tag.alert { background: #3a1000; color: var(--warning); }
  .vehicle-tag.order { background: #1a2a00; color: #88cc44; }

  /* ===== VEHICLE DETAIL ===== */
  #detail-view {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 200; overflow-y: auto;
  }
  .detail-header {
    background: linear-gradient(135deg, #1a0000, #2d0808);
    border-bottom: 2px solid var(--accent);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 10;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .detail-title { font-size: 1.2rem; font-weight: 700; flex: 1; }
  .detail-img {
    width: 100%; height: 200px; object-fit: cover;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
  }
  .detail-img img { width: 100%; height: 100%; object-fit: cover; }
  .detail-body { padding: 12px; }

  /* ===== INFO GRID ===== */
  .info-section-title {
    font-size: 1rem; color: var(--text2); margin: 16px 0 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .info-label { font-size: 0.85rem; color: var(--text2); margin-bottom: 4px; } /* 拡大: 0.7→0.85 */
  .info-value { font-size: 1.05rem; font-weight: 600; } /* 拡大: 0.95→1.05 */

  /* ===== ACTION BUTTONS ===== */
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0 8px; }
  .action-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 8px 0; }
  .btn {
    padding: 12px 8px; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
    border: none; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px; transition: opacity 0.2s;
  }
  .btn:active { opacity: 0.7; }
  .btn-icon { font-size: 1.3rem; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-warning { background: #332200; color: var(--warning); border: 1px solid #664400; }
  .btn-danger  { background: #330000; color: var(--danger);  border: 1px solid #660000; }
  .btn-blue    { background: #001833; color: var(--blue);    border: 1px solid #003366; }
  .btn-success { background: #001a00; color: #44cc66;        border: 1px solid #004400; }

  /* ===== MAINTENANCE LIST ===== */
  .maint-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .maint-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
  }
  .maint-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .maint-type { font-size: 1rem; font-weight: 700; } /* 拡大 */
  .maint-date { font-size: 0.85rem; color: var(--text2); } /* 拡大 */
  .maint-detail { font-size: 0.9rem; color: var(--text2); margin-top: 6px; } /* 拡大 */
  .maint-km { font-size: 0.85rem; color: var(--text2); margin-top: 4px; } /* 拡大 */

  /* ===== WORK ORDER LIST ===== */
  .order-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .order-card {
    background: var(--surface); border-radius: 8px; padding: 12px;
    border-left: 4px solid var(--warning);
  }
  .order-card.status-progress { border-left-color: #ff6600; }
  .order-card.status-done { border-left-color: var(--online); }
  .order-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .order-title { font-size: 1rem; font-weight: 700; flex: 1; } /* 拡大 */
  .order-status-badge {
    font-size: 0.8rem; padding: 2px 8px; border-radius: 12px;
    background: #332200; color: var(--warning); white-space: nowrap;
  }
  .order-status-badge.progress { background: #331a00; color: #ff6600; }
  .order-status-badge.done { background: #001a00; color: #44cc66; }
  .order-detail { font-size: 0.9rem; color: var(--text2); margin-top: 6px; }
  .order-driver { font-size: 0.85rem; color: var(--text2); margin-top: 4px; }
  .order-date { font-size: 0.85rem; color: var(--text2); }

  /* ===== MODALS ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 500;
    overflow-y: auto;
  }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; padding: 20px 12px; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; width: 100%; max-width: 500px;
    padding: 20px; margin-top: 20px;
  }
  .modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.9rem; color: var(--text2); margin-bottom: 6px; display: block; } /* 拡大 */
  .form-input, .form-select, .form-textarea {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 1rem; /* 拡大 */
    padding: 10px 12px; outline: none; font-family: inherit;
  }
  .form-textarea { min-height: 90px; resize: vertical; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent2); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; padding: 14px; font-size: 1rem; }

  /* ===== STATS TAB ===== */
  .stats-content { padding: 16px; }
  .stats-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .stats-card-title { font-size: 1rem; color: var(--text2); margin-bottom: 10px; font-weight: 600; }
  .stats-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .stats-row:last-child { border-bottom: none; }
  .stats-key { font-size: 0.95rem; } /* 拡大 */
  .stats-val { font-size: 1rem; font-weight: 700; } /* 拡大 */

  /* ===== PHOTO UPLOAD ===== */
  .photo-upload-area {
    width: 100%; aspect-ratio: 16/9; border-radius: 8px;
    border: 2px dashed var(--border); background: var(--surface2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden; position: relative; transition: border-color 0.2s;
  }
  .photo-upload-area:active { border-color: var(--accent2); }
  .photo-upload-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .photo-upload-hint { color: var(--text2); font-size: 0.9rem; text-align: center; pointer-events: none; z-index: 1; }
  .photo-upload-hint span { font-size: 2rem; display: block; margin-bottom: 6px; }
  input[type="file"] { display: none; }

  /* ===== LOADING / EMPTY ===== */
  .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 1rem; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state-text { font-size: 1rem; } /* 拡大 */

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 12px 24px;
    border-radius: 24px; font-size: 0.95rem; z-index: 9999;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: #1a4a1a; border: 1px solid #44cc66; }
  .toast.error   { background: #4a1a1a; border: 1px solid #cc4444; }
</style>
</head>
<body>

<!-- ===== APP HEADER ===== -->
<div class="app-header">
  <img class="app-logo" src="https://adblue2020-sketch.github.io/raikivehicle/logo.png"
       onerror="this.style.display='none'" alt="ライキ">
  <div class="app-title-area">
    <div class="app-title">車両整備管理</div>
    <div class="app-subtitle">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">読み込み中…</span>
    </div>
  </div>
  <button class="reload-btn" onclick="loadData()" title="更新">↻</button>
</div>

<!-- ===== TAB BAR ===== -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('vehicles')">🚛🟢 車両・整備一覧</button>
  <button class="tab-btn" onclick="switchTab('stats')">📊 統計</button>
</div>

<!-- ===== VEHICLES TAB ===== -->
<div id="tab-vehicles" class="tab-content active">
  <div class="vehicle-list" id="vehicle-list">
    <div class="loading">🔄 データを読み込み中…</div>
  </div>
</div>

<!-- ===== STATS TAB ===== -->
<div id="tab-stats" class="tab-content">
  <div class="stats-content" id="stats-content">
    <div class="loading">🔄 読み込み中…</div>
  </div>
</div>

<!-- ===== MODAL: 重複削除確認 ===== -->
<div class="modal-overlay" id="modal-dedup">
  <div class="modal-box">
    <div class="modal-title">🗑️ 重複車両を削除</div>
    <div id="dedup-preview" style="margin-bottom:16px">
      <div class="loading">確認中…</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-dedup')">キャンセル</button>
      <button class="btn btn-danger" id="dedup-exec-btn" onclick="execDedup()" style="display:none">削除する</button>
    </div>
  </div>
</div>

<!-- ===== VEHICLE DETAIL VIEW ===== -->
<div id="detail-view">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">‹</button>
    <div class="detail-title" id="detail-vehicle-name">車両詳細</div>
  </div>
  <div id="detail-content"></div>
</div>

<!-- ===== MODAL: 車両登録 ===== -->
<div class="modal-overlay" id="modal-add-vehicle">
  <div class="modal-box">
    <div class="modal-title">🚛 車両を登録</div>
    <div class="form-group">
      <label class="form-label">📷 車両写真</label>
      <div class="photo-upload-area" id="av-photo-preview" onclick="document.getElementById('av-photo-input').click()">
        <div class="photo-upload-hint"><span>📷</span>タップして写真を選択</div>
      </div>
      <input type="file" id="av-photo-input" accept="image/*" onchange="previewPhoto('av-photo-input','av-photo-preview')">
    </div>
    <div class="form-group">
      <label class="form-label">車両名（ニックネーム）</label>
      <input class="form-input" id="av-name" placeholder="例: 1号車">
    </div>
    <div class="form-group">
      <label class="form-label">型式</label>
      <input class="form-input" id="av-model" placeholder="例: FP74HD">
    </div>
    <div class="form-group">
      <label class="form-label">車体番号</label>
      <input class="form-input" id="av-chassisno" placeholder="例: 500817">
    </div>
    <div class="form-group">
      <label class="form-label">年式</label>
      <input class="form-input" id="av-year" placeholder="例: 2017年式">
    </div>
    <div class="form-group">
      <label class="form-label">現在の走行距離 (km)</label>
      <input class="form-input" id="av-km" type="number" placeholder="例: 460949">
    </div>
    <div class="form-group">
      <label class="form-label">カラー</label>
      <input class="form-input" id="av-color" placeholder="例: パールホワイト">
    </div>
    <div class="form-group">
      <label class="form-label">エンジン番号</label>
      <input class="form-input" id="av-engineno" placeholder="例: 6M70-000000">
    </div>
    <div class="form-group">
      <label class="form-label">備考</label>
      <textarea class="form-textarea" id="av-notes" placeholder="その他メモ"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-vehicle')">キャンセル</button>
      <button class="btn btn-primary" onclick="submitAddVehicle()">登録する</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 整備記録 ===== -->
<div class="modal-overlay" id="modal-add-maint">
  <div class="modal-box">
    <div class="modal-title">🔧 整備を記録</div>
    <div class="form-group">
      <label class="form-label">整備種別</label>
      <select class="form-select" id="am-type">
        <option>エンジンオイル交換</option>
        <option>オイルフィルター交換</option>
        <option>燃料フィルター交換</option>
        <option>エアフィルター交換</option>
        <option>ファンベルト交換</option>
        <option>Fキャブサス交換</option>
        <option>Rキャブサス交換</option>
        <option>タイヤ交換</option>
        <option>ブレーキ整備</option>
        <option>車検</option>
        <option>その他</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">作業日</label>
      <input class="form-input" id="am-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">走行距離 (km)</label>
      <input class="form-input" id="am-km" type="number" placeholder="作業時の走行距離">
    </div>
    <div class="form-group">
      <label class="form-label">作業詳細・使用部品番号</label>
      <textarea class="form-textarea" id="am-detail" placeholder="例: MX933972 交換、次回交換目安 480,000km"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">作業者</label>
      <input class="form-input" id="am-worker" placeholder="例: 山田">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-maint')">キャンセル</button>
      <button class="btn btn-primary" onclick="submitAddMaint()">保存する</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 作業依頼・故障中 ===== -->
<div class="modal-overlay" id="modal-work-order">
  <div class="modal-box">
    <div class="modal-title">🚨 作業依頼・故障登録</div>
    <div class="form-group">
      <label class="form-label">不具合・依頼の種類</label>
      <select class="form-select" id="wo-category">
        <option>修理依頼</option>
        <option>故障中（走行不可）</option>
        <option>故障中（走行可）</option>
        <option>点検依頼</option>
        <option>部品交換依頼</option>
        <option>その他</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">不具合・症状の内容 <span style="color:var(--danger)">*</span></label>
      <textarea class="form-textarea" id="wo-detail" placeholder="例: エンジンから異音がする。アクセルを踏むと振動が大きい。"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">発生日</label>
      <input class="form-input" id="wo-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">現在の走行距離 (km)</label>
      <input class="form-input" id="wo-km" type="number" placeholder="例: 462000">
    </div>
    <div class="form-group">
      <label class="form-label">ドライバー名</label>
      <input class="form-input" id="wo-driver" placeholder="例: 田中">
    </div>
    <div class="form-group">
      <label class="form-label">緊急度</label>
      <select class="form-select" id="wo-priority">
        <option value="normal" selected>🟢 通常</option>
        <option value="low">🟡 故障レベル低い</option>
        <option value="mid">🔴 故障レベル中</option>
        <option value="high">⚫️ 故障レベル高</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-work-order')">キャンセル</button>
      <button class="btn btn-danger" onclick="submitWorkOrder()">📨 依頼を送信</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 部品カタログ ===== -->
<div class="modal-overlay" id="modal-parts-history">
  <div class="modal-box" style="max-width:540px">
    <div class="modal-title">📗 部品カタログ</div>
    <div style="font-size:0.85rem;color:var(--text2);margin-bottom:14px">この車両で使用できる部品番号の一覧です。純正・社外を区別して管理できます。</div>

    <!-- 追加フォーム（折りたたみ） -->
    <div id="parts-add-form" style="display:none;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="font-size:0.95rem;font-weight:700;margin-bottom:12px;color:#44cc66">➕ 部品を追加</div>
      <div class="form-group" style="margin-bottom:10px">
        <label class="form-label">部品カテゴリ</label>
        <select class="form-select" id="pc-category">
          <option value="エンジンオイルエレメント">エンジンオイルエレメント</option>
          <option value="燃料エレメント">燃料エレメント</option>
          <option value="エアーエレメント">エアーエレメント</option>
          <option value="ファンベルト">ファンベルト</option>
          <option value="ファンベルト2">ファンベルト2</option>
          <option value="Fキャブサス">Fキャブサス</option>
          <option value="Rキャブサス">Rキャブサス</option>
          <option value="ブレーキパッド（前）">ブレーキパッド（前）</option>
          <option value="ブレーキパッド（後）">ブレーキパッド（後）</option>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyHdQLFYaOGuPFRBT8B6g03d8P85-yyXw3ltepJ5IvmIa9M_UEvcbKUoCyOw2BfiSq1/exec';
const SHEET_ID = '1jVY7avOC3IHg19SmtGBcup_Z7H56esxEtqGGVTaX6j8';

let allData = { vehicles: [], maintenance: [], workOrders: [] };
let currentVehicleId = null;

// ============================================================
// DATA LOADING  ※ GAS仕様: ?sheet=シート名 → 2次元配列 [[header],[row],...]
// ============================================================

// 2次元配列 → オブジェクト配列に変換（1行目をキーとして使う）
function sheetToObjects(rows) {
  if (!rows || rows.length < 2) return [];
  const headers = rows[0].map(h => String(h).trim());
  return rows.slice(1).filter(row => row.some(c => c !== '' && c !== null && c !== undefined))
    .map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] !== undefined ? row[i] : ''; });
      return obj;
    });
}

// シート名を指定して2次元配列を取得
async function fetchSheet(sheetName) {
  const url = `${GAS_URL}?sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
  const res = await fetch(url);
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

// customParts JSON文字列をパース → {label: value} の辞書に変換
function parseCustomParts(str) {
  try {
    const arr = JSON.parse(str || '[]');
    const result = {};
    arr.forEach(p => { if (p.label && p.value) result[p.label] = p.value; });
    return result;
  } catch(e) { return {}; }
}

// vehicles シートのオブジェクトを正規化
// 実際のカラム: id, licensePlate, vinType, vinNum, maker, model, year, color,
//               currentMileage, notes, customParts(JSON), photo, updatedAt
function normalizeVehicle(obj, idx) {
  const id = String(obj['id'] || idx);
  const parts = parseCustomParts(obj['customParts']);
  return {
    id,
    name:      String(obj['licensePlate'] || obj['名前'] || ''),
    model:     String(obj['model'] || obj['vinType'] || ''),
    chassisNo: String(obj['vinNum'] || ''),
    engineNo:  String(obj['engineNo'] || ''),
    km:        obj['currentMileage'] || obj['走行距離'] || 0,
    year:      obj['year'] ? String(Math.round(Number(obj['year']))) + '年式' : '',
    color:     String(obj['color'] || obj['カラー'] || ''),
    maker:     String(obj['maker'] || ''),
    imageUrl:  String(obj['photo'] || ''),
    notes:     String(obj['notes'] || obj['備考'] || ''),
    parts,
    _raw: obj,
  };
}

// records シートのオブジェクトを正規化
// 実際のカラム: id, licensePlate, partName, category, date, worker, mileage, cost, notes, createdAt
function normalizeMaint(obj) {
  return {
    id:        String(obj['id'] || ''),
    vehicleId: String(obj['licensePlate'] || obj['vehicleId'] || obj['車両ID'] || ''),
    type:      String(obj['partName'] || obj['整備種別'] || obj['種別'] || ''),
    date:      String((obj['date'] || '').toString().slice(0, 10)),
    km:        obj['mileage'] || obj['走行距離'] || 0,
    detail:    String(obj['notes'] || obj['詳細'] || ''),
    worker:    String(obj['worker'] || obj['作業者'] || ''),
    cost:      obj['cost'] || '',
    category:  String(obj['category'] || ''),
    _raw: obj,
  };
}

function normalizeOrder(obj) {
  return {
    id:        String(obj['id'] || ''),
    vehicleId: String(obj['licensePlate'] || obj['vehicleId'] || obj['車両ID'] || ''),
    category:  String(obj['種類'] || obj['category'] || '作業依頼'),
    detail:    String(obj['内容'] || obj['詳細'] || obj['detail'] || ''),
    date:      String((obj['date'] || obj['発生日'] || '').toString().slice(0, 10)),
    km:        obj['mileage'] || obj['走行距離'] || 0,
    driver:    String(obj['driver'] || obj['ドライバー'] || ''),
    priority:  String(obj['priority'] || obj['緊急度'] || 'mid'),
    status:    String(obj['status'] || obj['ステータス'] || 'pending'),
    _raw: obj,
  };
}

async function loadData() {
  updateStatus('読み込み中…', false);
  try {
    // GASはシート名を指定して1シートずつ取得する仕様
    const [rawVehicles, rawMaint, rawOrders] = await Promise.all([
      fetchSheet('vehicles'),
      fetchSheet('records'),
      fetchSheet('workOrders'),
    ]);

    const vehicleObjs = sheetToObjects(rawVehicles);
    const maintObjs   = sheetToObjects(rawMaint);
    const orderObjs   = sheetToObjects(rawOrders);

    // licensePlate（ナンバープレート）で重複除去 → 後の行を優先
    const vehiclesRaw = vehicleObjs.map(normalizeVehicle);
    const seenPlates = new Map();
    vehiclesRaw.forEach((v, i) => {
      const key = v.name.trim(); // licensePlate
      seenPlates.set(key, i);   // 後の行で上書き
    });
    allData.vehicles = Array.from(seenPlates.values()).map(i => vehiclesRaw[i]);

    allData.maintenance = maintObjs.map(normalizeMaint);
    allData.workOrders  = orderObjs.map(normalizeOrder);

    const dupCount = vehiclesRaw.length - allData.vehicles.length;
    if (dupCount > 0) console.warn(`重複車両 ${dupCount}件を除去しました`);
    console.log('vehicles:', allData.vehicles.length, allData.vehicles[0]);
    console.log('maint:', allData.maintenance.length, allData.maintenance[0]);

    updateStatus(`${allData.vehicles.length}台・整備${allData.maintenance.length}件`, true);
    renderVehicleList();
    renderStats();

    if (!allData.vehicles.length) showDebugBanner(rawVehicles);

  } catch (e) {
    console.error('loadData error:', e);
    updateStatus('オフライン', false);
    showToast('データ取得に失敗: ' + e.message, 'error');
  }
}

function showDebugBanner(rawRows) {
  const preview = JSON.stringify(rawRows).slice(0, 600);
  document.getElementById('vehicle-list').innerHTML = `
    <div style="background:#1a1a00;border:1px solid #666600;border-radius:8px;padding:16px;margin:12px">
      <div style="color:#ffcc00;font-weight:700;margin-bottom:8px">⚠️ GASレスポンス確認</div>
      <div style="color:#999;font-size:0.75rem;word-break:break-all;background:#111;padding:8px;border-radius:4px;max-height:150px;overflow:auto">${preview || '(空)'}</div>
    </div>
    <div style="padding:0 12px 12px">
      <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem" onclick="openModal('modal-add-vehicle')">
        <span class="btn-icon">➕</span>車両を登録
      </button>
    </div>`;
}

function updateStatus(text, online) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').style.background = online ? 'var(--online)' : 'var(--warning)';
}

// ============================================================
// VEHICLE LIST RENDER
// ============================================================
function renderVehicleList() {
  const el = document.getElementById('vehicle-list');
  if (!allData.vehicles.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🚛</div>
        <div class="empty-state-text">車両が登録されていません</div>
      </div>
      <div style="padding:0 12px 12px">
        <button class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem" onclick="openModal('modal-add-vehicle')">
          <span class="btn-icon">➕</span>車両を登録
        </button>
      </div>`;
    return;
  }
  let html = allData.vehicles.map(v => {
    const maint = allData.maintenance.filter(m => matchVehicle(m, v));
    const orders = (allData.workOrders || []).filter(o => matchVehicle(o, v) && o.status !== 'done');
    const lastMaint = maint.sort((a,b) => new Date(b.date) - new Date(a.date))[0];
    const imgHtml = v.imageUrl
      ? `<img src="${v.imageUrl}" onerror="this.parentElement.textContent='🚛'" alt="${v.name}">`
      : '🚛';
    const orderBadge = orders.length ? `<span class="vehicle-tag alert">🚨 作業依頼 ${orders.length}件</span>` : '';
    return `
      <div class="vehicle-card" onclick="openDetail('${v.id}')">
        <div class="vehicle-card-img">${imgHtml}</div>
        <div class="vehicle-card-body">
          <div class="vehicle-name">${v.name || v.model || '不明'}</div>
          <div class="vehicle-meta">
            <span class="vehicle-tag">📋 ${v.model || '-'}</span>
            <span class="vehicle-tag">🛣️ ${Number(v.km||0).toLocaleString()} km</span>
            <span class="vehicle-tag">${v.year || '-'}</span>
            ${lastMaint ? `<span class="vehicle-tag">🔧 最終整備: ${lastMaint.date}</span>` : ''}
            ${orderBadge}
          </div>
        </div>
      </div>`;
  }).join('');
  html += `<div style="padding:0 0 12px">
    <button class="btn btn-secondary" style="width:100%;padding:14px;font-size:1rem" onclick="openModal('modal-add-vehicle')">
      <span class="btn-icon">➕</span>車両を登録
    </button>
  </div>`;
  el.innerHTML = html;
}

// ============================================================
// DETAIL VIEW
// ============================================================
function openDetail(id) {
  currentVehicleId = id;
  const v = allData.vehicles.find(x => x.id === id);
  if (!v) return;
  document.getElementById('detail-vehicle-name').textContent = v.name || v.model || '車両詳細';
  document.getElementById('detail-view').style.display = 'block';
  document.body.style.overflow = 'hidden';
  renderDetailContent(v);
}

function closeDetail() {
  document.getElementById('detail-view').style.display = 'none';
  document.body.style.overflow = '';
  currentVehicleId = null;
}

function matchVehicle(record, v) {
  // licensePlate(v.name)一致 が主キー。IDや型式でもフォールバック
  return record.vehicleId === v.name      // licensePlate同士
      || record.vehicleId === v.id
      || record.vehicleId === v.model
      || record.vehicleId === v.chassisNo;
}

function renderDetailContent(v) {
  const maint = allData.maintenance.filter(m => matchVehicle(m, v))
    .sort((a,b) => new Date(b.date) - new Date(a.date));
  const orders = (allData.workOrders || []).filter(o => matchVehicle(o, v))
    .sort((a,b) => new Date(b.date) - new Date(a.date));
  const activeOrders = orders.filter(o => o.status !== 'done');

  const imgHtml = v.imageUrl
    ? `<img src="${v.imageUrl}" onerror="this.parentElement.textContent='🚛'" alt="${v.name}">`
    : '🚛';

  // ステータスバナー（作業依頼があれば表示）
  const orderBanner = activeOrders.length
    ? `<div style="background:#331a00;border-left:4px solid var(--warning);padding:12px 16px;display:flex;align-items:center;gap:8px">
        <span style="font-size:1.3rem">🚨</span>
        <span style="font-size:0.95rem;font-weight:600;color:var(--warning)">作業依頼・対応中 ${activeOrders.length}件</span>
      </div>` : '';

  // 作業依頼リスト
  const ordersHtml = orders.length ? orders.map(o => {
    const statusClass = o.status === 'done' ? 'done' : o.status === 'progress' ? 'progress' : '';
    const statusLabel = o.status === 'done' ? '✅ 完了' : o.status === 'progress' ? '🟠 対応中' : '🟡 依頼中';
    const badgeClass = o.status === 'done' ? 'done' : o.status === 'progress' ? 'progress' : '';
    const prioIcon = o.priority === 'high'   ? '⚫️' :
                    o.priority === 'mid'    ? '🔴' :
                    o.priority === 'low'    ? '🟡' : '🟢';
    return `
      <div class="order-card ${statusClass}">
        <div class="order-card-header">
          <div class="order-title">${prioIcon} ${o.category || '作業依頼'}</div>
          <span class="order-status-badge ${badgeClass}">${statusLabel}</span>
        </div>
        <div class="order-detail">${o.detail || ''}</div>
        <div class="order-driver" style="margin-top:6px;display:flex;gap:12px;flex-wrap:wrap">
          ${o.driver ? `<span>👤 ${o.driver}</span>` : ''}
          ${o.km ? `<span>🛣️ ${Number(o.km).toLocaleString()} km</span>` : ''}
          <span class="order-date">${o.date || ''}</span>
        </div>
      </div>`;
  }).join('') : `<div class="empty-state" style="padding:24px 0">
    <div class="empty-state-icon" style="font-size:2rem">✅</div>
    <div class="empty-state-text">作業依頼はありません</div>
  </div>`;

  // 整備履歴リスト
  const maintHtml = maint.length ? maint.map(m => `
    <div class="maint-card">
      <div class="maint-card-header">
        <div class="maint-type">${m.type || '整備'}</div>
        <div class="maint-date">${m.date || ''}</div>
      </div>
      ${m.detail ? `<div class="maint-detail">${m.detail}</div>` : ''}
      <div class="maint-km" style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px">
        ${m.km ? `<span>🛣️ ${Number(m.km).toLocaleString()} km</span>` : ''}
        ${m.worker ? `<span>👤 ${m.worker}</span>` : ''}
      </div>
    </div>`).join('') : `<div class="empty-state" style="padding:24px 0">
    <div class="empty-state-icon" style="font-size:2rem">🔧</div>
    <div class="empty-state-text">整備記録がありません</div>
  </div>`;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-img">${imgHtml}</div>
    ${orderBanner}
    <div class="detail-body">

      <!-- アクションボタン -->
      <div class="action-row">
        <button class="btn btn-blue" onclick="openMaintModal()">
          <span class="btn-icon">🔧</span>整備を記録
        </button>
        <button class="btn btn-danger" onclick="openWorkOrderModal()">
          <span class="btn-icon">🚨</span>作業依頼・故障中
        </button>
      </div>
      <div class="action-row">
        <button class="btn btn-success" onclick="openPartsCatalogModal()">
          <span class="btn-icon">📗</span>部品カタログ
        </button>
        <button class="btn btn-warning" onclick="openEditVehicleModal()">
          <span class="btn-icon">✏️</span>車両情報・写真編集
        </button>
      </div>

      <!-- 基本情報 -->
      <div class="info-section-title">📋 基本情報</div>
      <div class="info-grid">
        <div class="info-cell">
          <div class="info-label">車体番号 型式</div>
          <div class="info-value">${v.model || '–'}</div>
        </div>
        <div class="info-cell">
          <div class="info-label">車体番号 番号</div>
          <div class="info-value">${v.chassisNo || '–'}</div>
        </div>
        <div class="info-cell">
          <div class="info-label">エンジン番号</div>
          <div class="info-value">${v.engineNo || '–'}</div>
        </div>
        <div class="info-cell">

// SUBMIT: 車両登録
// ============================================================
// ============================================================
// GASのdoPost仕様: { sheet: シート名, data: [[行1],[行2],...] }
// シートを丸ごと上書きする。追記は既存データを読んでから末尾に行を足す。
// ============================================================

// 既存シートのデータ取得（2次元配列）
async function fetchSheetRaw(sheetName) {
  const url = `${GAS_URL}?sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
  const res = await fetch(url);
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

// シート全体を上書き保存
async function saveSheet(sheetName, rows2d) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ sheet: sheetName, data: rows2d })
  });
  return await res.json();
}

// ユニークIDを生成
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ============================================================
// SUBMIT: 車両登録
// ============================================================
async function submitAddVehicle() {
  const name      = document.getElementById('av-name').value.trim();
  const model     = document.getElementById('av-model').value.trim();
  const chassisNo = document.getElementById('av-chassisno').value.trim();
  const year      = document.getElementById('av-year').value.trim();
  const km        = document.getElementById('av-km').value;
  const color     = document.getElementById('av-color').value.trim();
  const engineNo  = document.getElementById('av-engineno').value.trim();
  const notes     = document.getElementById('av-notes').value.trim();
  const photo     = window._avPhotoBase64 || '';

  if (!name && !model) { showToast('車両名または型式を入力してください', 'error'); return; }

  try {
    showToast('保存中…', '');
    const existing = await fetchSheetRaw('vehicles');
    const headers = existing.length
      ? existing[0]
      : ['id','licensePlate','driver','vinType','vinNum','engineNum','maker','model',
         'year','color','currentMileage','notes','customParts','photo','updatedAt'];

    const newRow = headers.map(h => {
      switch(h) {
        case 'id':             return genId();
        case 'licensePlate':   return name;
        case 'vinType':        return model;
        case 'vinNum':         return chassisNo;
        case 'engineNum':      return engineNo;
        case 'year':           return year.replace('年式','');
        case 'color':          return color;
        case 'currentMileage': return km;
        case 'notes':          return notes;
        case 'photo':          return photo;
        case 'customParts':    return '[]';
        case 'updatedAt':      return new Date().toISOString();
        default:               return '';
      }
    });

    const rows = existing.length ? [...existing, newRow] : [headers, newRow];
    const result = await saveSheet('vehicles', rows);

    if (result && result.status === 'ok') {
      closeModal('modal-add-vehicle');
      window._avPhotoBase64 = '';
      showToast('車両を登録しました ✅', 'success');
      await loadData();
    } else {
      showToast('保存エラー: ' + JSON.stringify(result), 'error');
    }
  } catch(e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
}

// SUBMIT: 走行距離更新
// ============================================================
async function submitUpdateKm() {
  if (!currentVehicleId) return;
  const km = document.getElementById('uk-km').value;
  if (!km) { showToast('走行距離を入力してください', 'error'); return; }

  try {
    showToast('更新中…', '');
    const existing = await fetchSheetRaw('vehicles');
    if (!existing.length) { showToast('車両データが見つかりません', 'error'); return; }

    const headers = existing[0];
    const idIdx   = headers.indexOf('id');
    const kmIdx   = headers.findIndex(h => h === 'currentMileage' || h === '走行距離' || h === 'km');

    const updated = existing.map((row, i) => {
      if (i === 0) return row;
      if (String(row[idIdx]) === String(currentVehicleId)) {
        const r = [...row];
        if (kmIdx >= 0) r[kmIdx] = km;
        return r;
      }
      return row;
    });

    const result = await saveSheet('vehicles', updated);

    if (result && result.status === 'ok') {
      closeModal('modal-update-km');
      showToast('走行距離を更新しました ✅', 'success');
      await loadData();
      const v = allData.vehicles.find(x => x.id === currentVehicleId);
      if (v) renderDetailContent(v);
    } else {
      showToast('保存エラー: ' + JSON.stringify(result), 'error');
    }
  } catch(e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
}

// customParts JSON を取得（拡張形式に対応）
function getCustomPartsArray(v) {
  try {
    const raw = v._raw['customParts'] || '[]';
    const arr = JSON.parse(raw);
    // 旧形式 {id,label,value} → 新形式 {id,label,value,type,memo} に変換
    return arr.map(p => ({
      id:    p.id    || genId(),
      label: p.label || '',
      value: p.value || '',
      type:  p.type  || 'oem',
      memo:  p.memo  || '',
    }));
  } catch(e) { return []; }
}

// カタログを画面に描画
function renderPartsCatalog() {
  const v = allData.vehicles.find(x => x.id === currentVehicleId);
  if (!v) return;
  const parts = getCustomPartsArray(v);
  const el = document.getElementById('parts-history-content');

  if (!parts.length) {
    el.innerHTML = `
      <div class="empty-state" style="padding:28px 0">
        <div class="empty-state-icon" style="font-size:2.5rem">📋</div>
        <div class="empty-state-text">部品がまだ登録されていません</div>
        <div style="font-size:0.85rem;color:var(--text2);margin-top:6px">上の「部品を追加」から登録してください</div>
      </div>`;
    return;
  }

  // カテゴリ別にグルーピング（登録順を維持）
  const groups = {};
  const groupOrder = [];
  parts.forEach(p => {
    const cat = p.label || 'その他';
    if (!groups[cat]) { groups[cat] = []; groupOrder.push(cat); }
    groups[cat].push(p);
  });

  el.innerHTML = `
    <div style="font-size:0.85rem;color:var(--text2);margin-bottom:12px">${parts.length}件の部品が登録されています</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${groupOrder.map(cat => {
        const items = groups[cat];
        return `
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden">
          <div style="padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
            <span style="font-size:1rem">🔩</span>
            <span style="font-size:1rem;font-weight:700">${cat}</span>
            <span style="font-size:0.8rem;color:var(--text2);margin-left:auto">${items.length}件</span>
          </div>
          <div style="padding:4px 0">
            ${items.map((p, idx) => {
              const isFirst = idx === 0;
              const isLast  = idx === items.length - 1;
              return `
              <div style="padding:10px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)" id="part-row-${p.id}">
                <!-- 並び替えボタン -->
                <div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">
                  <button onclick="movePartCatalog('${p.id}',-1)"
                    style="width:26px;height:22px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:${isFirst?'#444':'var(--text2)'};font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center"
                    ${isFirst ? 'disabled' : ''}>▲</button>
                  <button onclick="movePartCatalog('${p.id}',1)"
                    style="width:26px;height:22px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:${isLast?'#444':'var(--text2)'};font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center"
                    ${isLast ? 'disabled' : ''}>▼</button>
                </div>
                <!-- 純正/社外バッジ -->
                <span style="font-size:0.7rem;padding:2px 7px;border-radius:10px;white-space:nowrap;font-weight:700;flex-shrink:0;
                  ${p.type==='oem'
                    ?'background:#001a33;color:#66aaff;border:1px solid #3399ff'
                    :'background:#1a1000;color:#ffaa44;border:1px solid #ff8800'}">
                  ${p.type==='oem'?'純正':'社外'}
                </span>
                <!-- 品番 -->
                <div style="flex:1;min-width:0">
                  <div style="font-size:1.05rem;font-weight:700;font-family:monospace;letter-spacing:0.05em">${p.value}</div>
                  ${p.memo?`<div style="font-size:0.8rem;color:var(--text2);margin-top:2px">${p.memo}</div>`:''}
                </div>
                <!-- 編集・削除ボタン -->
                <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
                  <button onclick="openEditPartModal('${p.id}')"
                    style="width:30px;height:28px;border-radius:6px;background:#001a33;border:1px solid #003366;color:#66aaff;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center">✏️</button>
                  <button onclick="deletePartCatalog('${p.id}')"

                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

async function submitAddPartCatalog() {
  if (!currentVehicleId) return;
  const catSel = document.getElementById('pc-category').value;
  const label  = catSel === 'その他'
    ? document.getElementById('pc-custom-category').value.trim()
    : catSel;
  const value  = document.getElementById('pc-partno').value.trim().toUpperCase();
  const memo   = document.getElementById('pc-memo').value.trim();

  if (!label) { showToast('部品カテゴリを入力してください', 'error'); return; }
  if (!value) { showToast('品番を入力してください', 'error'); return; }

  const v = allData.vehicles.find(x => x.id === currentVehicleId);
  if (!v) return;

  const parts = getCustomPartsArray(v);

  // 重複チェック
  if (parts.find(p => p.value.toUpperCase() === value && p.label === label)) {
    showToast('同じカテゴリに同じ品番がすでに存在します', 'error');
    return;
  }

  parts.push({ id: genId(), label, value, type: _pcSelectedType, memo });

  try {
    showToast('保存中…', '');
    await saveCustomParts(v, parts);
    showToast('部品を追加しました ✅', 'success');
    togglePartsAddForm(false);
    document.getElementById('pc-partno').value = '';
    document.getElementById('pc-memo').value = '';
    updateLocalCustomParts(parts);
    renderPartsCatalog();
  } catch(e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
}

async function deletePartCatalog(partId) {
  if (!currentVehicleId) return;
  const v = allData.vehicles.find(x => x.id === currentVehicleId);
  if (!v) return;
  const parts = getCustomPartsArray(v).filter(p => p.id !== partId);
  try {
    showToast('削除中…', '');
    await saveCustomParts(v, parts);
    updateLocalCustomParts(parts);
    showToast('削除しました', 'success');
    renderPartsCatalog();
  } catch(e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
}

// 並び替え（同カテゴリ内で上下移動）
async function movePartCatalog(partId, direction) {
  const v = allData.vehicles.find(x => x.id === currentVehicleId);
  if (!v) return;
  const parts = getCustomPartsArray(v);
  const idx = parts.findIndex(p => p.id === partId);
  if (idx < 0) return;

  // 同カテゴリ内のインデックス一覧
  const cat = parts[idx].label;
  const catIdxs = [];
  parts.forEach((p, i) => { if (p.label === cat) catIdxs.push(i); });
  const posInCat = catIdxs.indexOf(idx);
  const targetPos = posInCat + direction;
  if (targetPos < 0 || targetPos >= catIdxs.length) return;

  // swap（配列を直接入れ替え）
  const targetIdx = catIdxs[targetPos];
  const tmp = parts[idx];
  parts[idx] = parts[targetIdx];
  parts[targetIdx] = tmp;

  try {
    // スプレッドシートに保存してから再描画（loadDataは使わず直接allDataを更新）
    await saveCustomParts(v, parts);

    // allData.vehicles の該当車両の _raw.customParts を更新してすぐ再描画
    const vIdx = allData.vehicles.findIndex(x => x.id === currentVehicleId);
    if (vIdx >= 0) {
      allData.vehicles[vIdx]._raw['customParts'] = JSON.stringify(parts);
      allData.vehicles[vIdx].parts = {};
      parts.forEach(p => { if (p.label && p.value) allData.vehicles[vIdx].parts[p.label] = p.value; });
    }
    renderPartsCatalog();
  } catch(e) {
    showToast('並び替えエラー: ' + e.message, 'error');
  }
}

// 編集モーダルを開く
let _epSelectedType = 'oem';
function selectEditPartType(type) {
  _epSelectedType = type;
  const oemBtn = document.getElementById('ep-type-oem');
  const amBtn  = document.getElementById('ep-type-aftermarket');
  if (type === 'oem') {
    oemBtn.style.cssText  = 'flex:1;padding:10px;font-size:0.9rem;background:#001a33;color:#66aaff;border:2px solid #3399ff';
    amBtn.style.cssText   = 'flex:1;padding:10px;font-size:0.9rem;background:var(--surface2);color:var(--text2);border:1px solid var(--border)';
  } else {
    amBtn.style.cssText   = 'flex:1;padding:10px;font-size:0.9rem;background:#1a1000;color:#ffaa44;border:2px solid #ff8800';
    oemBtn.style.cssText  = 'flex:1;padding:10px;font-size:0.9rem;background:var(--surface2);color:var(--text2);border:1px solid var(--border)';
  }
}

function openEditPartModal(partId) {
  const v = allData.vehicles.find(x => x.id === currentVehicleId);
  if (!v) return;
  const parts = getCustomPartsArray(v);
  const p = parts.find(x => x.id === partId);
  if (!p) return;

  document.getElementById('ep-id').value    = partId;
  document.getElementById('ep-label').value = p.label || '';
  document.getElementById('ep-value').value = p.value || '';
  document.getElementById('ep-memo').value  = p.memo  || '';
  selectEditPartType(p.type || 'oem');
  openModal('modal-edit-part');
}

async function submitEditPart() {
  const partId = document.getElementById('ep-id').value;
  const label  = document.getElementById('ep-label').value.trim();
  const value  = document.getElementById('ep-value').value.trim().toUpperCase();
  const memo   = document.getElementById('ep-memo').value.trim();

  if (!label) { showToast('部品カテゴリを入力してください', 'error'); return; }
  if (!value) { showToast('品番を入力してください', 'error'); return; }

  const v = allData.vehicles.find(x => x.id === currentVehicleId);
  if (!v) return;

  const parts = getCustomPartsArray(v).map(p =>
    p.id === partId ? { ...p, label, value, type: _epSelectedType, memo } : p
  );

  try {
    showToast('保存中…', '');
    await saveCustomParts(v, parts);
    closeModal('modal-edit-part');
    showToast('更新しました ✅', 'success');
    updateLocalCustomParts(parts);
    renderPartsCatalog();
  } catch(e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
}

// allData.vehicles の該当車両のcustomPartsをメモリ上で更新
function updateLocalCustomParts(partsArray) {
  const vIdx = allData.vehicles.findIndex(x => x.id === currentVehicleId);
  if (vIdx < 0) return;
  allData.vehicles[vIdx]._raw['customParts'] = JSON.stringify(partsArray);
  const newParts = {};
  partsArray.forEach(p => { if (p.label && p.value) newParts[p.label] = p.value; });
  allData.vehicles[vIdx].parts = newParts;
}

// customPartsをスプレッドシートに書き戻す
async function saveCustomParts(v, partsArray) {
  const existing = await fetchSheetRaw('vehicles');
  if (!existing.length) throw new Error('vehicles シートが空');

  const headers  = existing[0];
  const idIdx    = headers.indexOf('id');
  const cpIdx    = headers.indexOf('customParts');
  if (cpIdx < 0) throw new Error('customParts カラムが見つかりません');

  const updated = existing.map((row, i) => {
    if (i === 0) return row;
    if (String(row[idIdx]) !== String(currentVehicleId)) return row;
    const r = [...row];
    r[cpIdx] = JSON.stringify(partsArray);
    return r;
  });

  const result = await saveSheet('vehicles', updated);
  if (!result || result.status !== 'ok') throw new Error(JSON.stringify(result));
}

// 写真をプレビュー表示 & base64をwindow変数に保存
function previewPhoto(inputId, previewId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;

  // 5MB上限チェック
  if (file.size > 5 * 1024 * 1024) {
    showToast('写真は5MB以下にしてください', 'error');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    const base64 = e.target.result;
    // プレビュー表示
    const preview = document.getElementById(previewId);
    preview.innerHTML = `<img src="${base64}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">
      <div style="position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:0.75rem;padding:2px 8px;border-radius:12px">タップで変更</div>`;
    // 変数に保存
    if (inputId === 'av-photo-input') window._avPhotoBase64 = base64;
    if (inputId === 'up-photo-input') window._upPhotoBase64 = base64;
  };
  reader.readAsDataURL(file);
}

function openEditVehicleModal() {
  const v = allData.vehicles.find(x => x.id === currentVehicleId);
  if (!v) return;

  // 写真プレビュー
  const preview = document.getElementById('up-photo-preview');
  if (v.imageUrl) {
    preview.innerHTML = `<img src="${v.imageUrl}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">
      <div style="position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,0.6);color:#fff;font-size:0.75rem;padding:2px 8px;border-radius:12px">タップで変更</div>`;
  } else {
    preview.innerHTML = '<div class="photo-upload-hint"><span>📷</span>タップして写真を選択</div>';
  }

  // 既存データをフォームにセット
  document.getElementById('up-name').value     = v.name      || '';
  document.getElementById('up-model').value    = v.model     || '';
  document.getElementById('up-chassisno').value= v.chassisNo || '';
  document.getElementById('up-year').value     = (v.year || '').replace('年式','');
  document.getElementById('up-km').value       = v.km        || '';
  document.getElementById('up-color').value    = v.color     || '';
  document.getElementById('up-engineno').value = v.engineNo  || '';
  document.getElementById('up-notes').value    = v.notes     || '';

  window._upPhotoBase64 = '';
  openModal('modal-update-photo');
}

async function submitUpdateVehicle() {
  if (!currentVehicleId) return;

  const name     = document.getElementById('up-name').value.trim();
  const model    = document.getElementById('up-model').value.trim();
  const chassisNo= document.getElementById('up-chassisno').value.trim();
  const year     = document.getElementById('up-year').value.trim();
  const km       = document.getElementById('up-km').value;
  const color    = document.getElementById('up-color').value.trim();
  const engineNo = document.getElementById('up-engineno').value.trim();
  const notes    = document.getElementById('up-notes').value.trim();
  const photo    = window._upPhotoBase64 || null; // nullなら既存写真を維持

  try {
    showToast('保存中…', '');
    const existing = await fetchSheetRaw('vehicles');
    if (!existing.length) return;

    const headers = existing[0];
    const idIdx = headers.indexOf('id');

    const updated = existing.map((row, i) => {
      if (i === 0) return row;
      if (String(row[idIdx]) !== String(currentVehicleId)) return row;
      const r = [...row];
      headers.forEach((h, j) => {
        switch(h) {
          case 'licensePlate':   r[j] = name     || r[j]; break;
          case 'vinType':        r[j] = model    || r[j]; break;
          case 'vinNum':         r[j] = chassisNo|| r[j]; break;
          case 'engineNum':      r[j] = engineNo || r[j]; break;
          case 'year':           r[j] = year     || r[j]; break;
          case 'color':          r[j] = color    || r[j]; break;
          case 'currentMileage': r[j] = km       || r[j]; break;
          case 'notes':          r[j] = notes    !== '' ? notes : r[j]; break;
          case 'photo':          r[j] = photo    || r[j]; break;
          case 'updatedAt':      r[j] = new Date().toISOString(); break;
        }
      });
      return r;
    });

    const result = await saveSheet('vehicles', updated);

    if (result && result.status === 'ok') {
      closeModal('modal-update-photo');
      window._upPhotoBase64 = '';
      showToast('車両情報を更新しました ✅', 'success');
      await loadData();
      const v = allData.vehicles.find(x => x.id === currentVehicleId);
      if (v) renderDetailContent(v);
    } else {
      showToast('保存エラー: ' + JSON.stringify(result), 'error');
    }
  } catch(e) {
    showToast('通信エラー: ' + e.message, 'error');
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ============================================================
// DEDUP - 重複車両の削除
// ============================================================

async function openDedupModal() {
  const el = document.getElementById('dedup-preview');
  const btn = document.getElementById('dedup-exec-btn');
  el.innerHTML = '<div class="loading">スプレッドシートを確認中…</div>';
  btn.style.display = 'none';
  openModal('modal-dedup');

  try {
    const rows = await fetchSheetRaw('vehicles');
    if (rows.length < 2) {
      el.innerHTML = '<div style="color:var(--online);text-align:center;padding:16px">✅ 重複はありません</div>';
      return;
    }

    const headers = rows[0];
    const lpIdx = headers.findIndex(h => h === 'licensePlate');
    const dataRows = rows.slice(1);

    // licensePlateごとに行インデックスを収集
    const plateMap = {};
    dataRows.forEach((row, i) => {
      const plate = String(row[lpIdx] || '').trim();
      if (!plate) return;
      if (!plateMap[plate]) plateMap[plate] = [];
      plateMap[plate].push(i);
    });

    // 重複しているものだけ抽出
    const dupPlates = Object.entries(plateMap).filter(([, idxs]) => idxs.length > 1);

    if (!dupPlates.length) {
      el.innerHTML = '<div style="color:var(--online);text-align:center;padding:16px;font-size:1rem">✅ 重複はありません！<br><span style="font-size:0.85rem;color:var(--text2)">スプレッドシートはきれいです</span></div>';
      return;
    }

    // 重複一覧を表示
    el.innerHTML = `
      <div style="color:var(--warning);font-weight:700;margin-bottom:10px">⚠️ ${dupPlates.length}台に重複が見つかりました</div>
      <div style="font-size:0.85rem;color:var(--text2);margin-bottom:12px">各ナンバーの最新行のみ残し、古い行を削除します。</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${dupPlates.map(([plate, idxs]) => `
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px">
            <div style="font-size:1rem;font-weight:700">${plate}</div>
            <div style="font-size:0.85rem;color:var(--text2);margin-top:4px">
              ${idxs.length}行 → 最新1行を残して <span style="color:var(--danger)">${idxs.length - 1}行を削除</span>
            </div>
          </div>`).join('')}
      </div>`;

    // 削除ボタンを表示
    btn.style.display = 'block';
    // 削除対象の行番号を保存（古い行 = 最後以外）
    window._dedupRows = rows;
    window._dedupDupPlates = dupPlates;
    window._dedupLpIdx = lpIdx;

  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger)">エラー: ${e.message}</div>`;
  }
}

async function execDedup() {
  const rows      = window._dedupRows;
  const dupPlates = window._dedupDupPlates;
  const lpIdx     = window._dedupLpIdx;
  if (!rows || !dupPlates) return;

  const btn = document.getElementById('dedup-exec-btn');
  btn.disabled = true;
  btn.textContent = '削除中…';

  try {
    // 各ナンバーで削除する行インデックスを特定（最後の1行を残す）
    const removeIdxSet = new Set();
    const dataRows = rows.slice(1);
    const plateMap = {};
    dataRows.forEach((row, i) => {
      const plate = String(row[lpIdx] || '').trim();
      if (!plate) return;
      if (!plateMap[plate]) plateMap[plate] = [];
      plateMap[plate].push(i);
    });
    dupPlates.forEach(([plate]) => {
      const idxs = plateMap[plate];
      // 最後を残して他を削除対象に
      idxs.slice(0, -1).forEach(i => removeIdxSet.add(i));
    });

    // 残す行だけ抽出（ヘッダー + 重複でない行）
    const cleanedData = [
      rows[0],
      ...dataRows.filter((_, i) => !removeIdxSet.has(i))
    ];

    const result = await saveSheet('vehicles', cleanedData);

    if (result && result.status === 'ok') {
      closeModal('modal-dedup');
      showToast(`重複 ${removeIdxSet.size}件を削除しました ✅`, 'success');
      await loadData();
    } else {
      showToast('保存エラー: ' + JSON.stringify(result), 'error');
    }
  } catch(e) {
    showToast('エラー: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '削除する';
  }
}
